{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">{{ t('add_new_title') }}</h1>
    
    <form method="POST" class="bg-white rounded-xl shadow-md p-6 lg:p-8">
        <div class="mb-5">
            <label class="block text-gray-700 text-sm font-semibold mb-2">{{ t('custom_name') }}</label>
            <input type="text" name="name" placeholder="{{ t('custom_name_placeholder') }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <p class="text-xs text-gray-400 mt-1">{{ t('custom_name_hint') }}</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-5">
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">{{ t('brand') }}</label>
                <select name="brand_id" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" required>
                    {% for b in brands %}
                    <option value="{{ b.id }}">{{ b.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">{{ t('material') }}</label>
                <select name="material_id" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" required>
                    {% for m in materials %}
                    <option value="{{ m.id }}">{{ m.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">{{ t('color') }}</label>
                <select name="color_id" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" required>
                    {% for c in colors %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">{{ t('quantity') }}</label>
                <input type="number" name="quantity" value="1" min="1" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">{{ t('price') }}</label>
                <input type="number" name="price" step="0.1" min="0" placeholder="699" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8">
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">{{ t('weight_total') }}</label>
                <input type="number" name="weight_total" value="1000" min="1" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
        </div>

        <div class="flex justify-end pt-4 border-t border-gray-100">
            <a href="{{ url_for('index') }}" class="text-gray-500 font-semibold py-2 px-6 rounded-lg mr-2 hover:bg-gray-100 transition-colors">{{ t('cancel') }}</a>
            <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg shadow transition-colors flex items-center gap-2">
                <i class="fa-solid fa-floppy-disk"></i> {{ t('save') }}
            </button>
        </div>
    </form>
</div>
{% endblock %}
