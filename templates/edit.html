{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <div class="w-4 h-8 rounded" style="background-color: {{ filament.color.hex_value }};"></div>
        <h1 class="text-3xl font-bold text-gray-800">{{ t('edit_title') }}: {{ filament.name }}</h1>
    </div>

    <form method="POST" class="bg-white rounded-xl shadow-md p-6 lg:p-8">
        <div class="mb-5">
            <label class="block text-gray-700 text-sm font-semibold mb-2">{{ t('custom_name') }}</label>
            <input type="text" name="name" value="{{ filament.name }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">{{ t('weight_total') }}</label>
                <input type="number" value="{{ filament.weight_total }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 bg-gray-100 text-gray-500 cursor-not-allowed" readonly>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">{{ t('weight_remaining_add') }}</label>
                <input type="number" name="weight_remaining" value="{{ filament.weight_remaining }}" min="0" step="0.1" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8">
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">{{ t('quantity') }}</label>
                <input type="number" name="quantity" value="{{ filament.quantity }}" min="1" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">{{ t('price') }}</label>
                <input type="number" name="price" value="{{ filament.price }}" step="0.1" min="0" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
        </div>

        <div class="flex justify-end pt-4 border-t border-gray-100">
            <a href="{{ url_for('index') }}" class="text-gray-500 font-semibold py-2 px-6 rounded-lg mr-2 hover:bg-gray-100 transition-colors">{{ t('cancel') }}</a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow transition-colors flex items-center gap-2">
                <i class="fa-solid fa-check"></i> {{ t('save_changes') }}
            </button>
        </div>
    </form>
</div>
{% endblock %}
