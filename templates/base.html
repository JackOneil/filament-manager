<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('title') }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans text-gray-800 flex flex-col min-h-screen">
    <nav class="bg-blue-600 text-white shadow-lg relative z-20">
        <div class="container mx-auto px-6 py-4 flex flex-wrap justify-between items-center">
            <a href="{{ url_for('index') }}" class="text-xl md:text-2xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-layer-group"></i> {{ t('title') }}
            </a>
            
            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="md:hidden flex items-center p-2 rounded hover:bg-blue-700 transition" aria-label="Toggle Menu">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>

            <!-- Navigation Links -->
            <div id="nav-links" class="hidden w-full md:flex md:w-auto md:space-x-6 flex-col md:flex-row mt-4 md:mt-0 space-y-3 md:space-y-0 pb-2 md:pb-0">
                <a href="{{ url_for('index') }}" class="block hover:text-blue-200 transition-colors py-1 md:py-0 border-b border-blue-500 md:border-0">{{ t('overview') }}</a>
                <a href="{{ url_for('add') }}" class="block hover:text-blue-200 transition-colors py-1 md:py-0 border-b border-blue-500 md:border-0">{{ t('add_filament') }}</a>
                <a href="{{ url_for('calculator') }}" class="block hover:text-blue-200 transition-colors py-1 md:py-0 border-b border-blue-500 md:border-0">{{ t('calculator') }}</a>
                <a href="{{ url_for('history') }}" class="block hover:text-blue-200 transition-colors py-1 md:py-0 border-b border-blue-500 md:border-0">{{ t('movement_history') }}</a>
                <a href="{{ url_for('settings') }}" class="block hover:text-blue-200 transition-colors py-1 md:py-0"><i class="fa-solid fa-cog"></i> {{ t('settings') }}</a>
            </div>
        </div>
    </nav>
    <script>
        // Toggle mobile menu visibility
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('nav-links');
        
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
            menu.classList.toggle('flex');
            
            const icon = btn.querySelector('i');
            if(menu.classList.contains('hidden')) {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            } else {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
            }
        });
    </script>
    <div class="container mx-auto px-4 sm:px-6 py-4 sm:py-8 flex-grow overflow-x-hidden">
        {% block content %}{% endblock %}
    </div>
    <footer class="bg-gray-800 text-gray-400 py-4 mt-auto">
        <div class="container mx-auto text-center text-sm font-mono">
            v{{ app_version }}
        </div>
    </footer>
</body>
</html>
